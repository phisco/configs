format = """
[‚ĖĎ‚Ėí‚Ėď](#a3aed2)\
$hostname\
$kubernetes\
[Óāī](bg:#769ff0 fg:#a3aed2)\
$directory\
[Óāī](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$git_state\
[Óāī](fg:#394260 bg:#1d2230)\
$time\
[Óāī ](fg:#1d2230)\
$status\
$cmd_duration\
\n$character"""

[directory]
style = "fg:black bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Óú•"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($ahead_behind$all_status )](fg:#769ff0 bg:#394260)]($style)'
conflicted = 'ūüí•${count} '
ahead = '‚¨ÜÔłé${count} '
behind = '‚¨áÔłé${count} '
diverged = 'ūüö®\[‚¨ÜÔłé${ahead_count}‚¨áÔłé${behind_count}\] '
up_to_date = ''
untracked = '‚Ěď${count} '
stashed = 'ūüŹĚÔłŹ${count} '
modified = 'ūüďĚ${count} '
staged = 'ūüď¶${count} '

[git_state]
style = "bg:#394260"
format = '[\($state( $progress_current/$progress_total)\) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ Ôźļ $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[status]
format = '[$symbol $status]($style) '
disabled = false

[kubernetes]
disabled = false
style = "bg:#a3aed2 fg:#1d2230"
format = '[ $symbol$context ]($style)'

[[kubernetes.contexts]]
context_pattern = "gke_.*_(?P<cluster>[\\w-]+)"
context_alias = "gke-$cluster"

[hostname]
ssh_only = true
style = "bg:#a3aed2 fg:#1d2230"
format = '[ $hostname ]($style)'
